<div class="payment-options">
    <!-- দুটি আলাদা বাটন -->
    <button onclick="showSection('deposit')">ডিপোজিট করুন</button>
    <button onclick="showSection('withdraw')" style="background: #dc3545;">উইথড্র করুন</button>
</div>

<!-- ডিপোজিট সেকশন (আগের মতোই থাকবে) -->
<div id="deposit-section" class="hidden">
    <div class="payment-methods">
        <button onclick="openForm('নগদ', '01943806877')">নগদ</button>
        <button onclick="openForm('বিকাশ', '01943806877')">বিকাশ</button>
    </div>
    
    <div id="deposit-form" class="hidden">
        <h3 id="method-title"></h3>
        <p>নাম্বার কপি করুন: <b id="display-number"></b></p>
        <input type="text" id="user-id" placeholder="আপনার গেম আইডি/নাম">
        <input type="text" id="trx-id" placeholder="ট্রানজেকশন আইডি দিন">
        <button class="submit-btn" id="submit-btn" onclick="processAll()">কনফার্ম ডিপোজিট</button>
        <p id="status-text" style="display:none; font-weight:bold;"></p>
    </div>
</div>

<!-- উইথড্র সেকশন -->
<div id="withdraw-section" class="hidden" style="background: #fff3cd; padding: 20px; border-radius: 10px; margin-top: 20px; border: 1px solid #ffeeba;">
    <h3>উইথড্র রিকোয়েস্ট</h3>
    <input type="text" id="w-user-id" placeholder="আপনার গেম আইডি">
    <input type="text" id="w-last-num" placeholder="টাকার পরিমাণ/কোড">
    <button class="submit-btn" id="withdraw-submit-btn" onclick="processWithdraw()">উইথড্র রিকোয়েস্ট পাঠান</button>
    
    <div id="w-admin-response" style="display:none; margin-top: 15px; padding: 10px; background: #fff; border: 1px dashed #000;">
        <p id="w-status-text" style="font-weight:bold;"></p>
        <p id="admin-number-display" style="color: blue; font-size: 1.2em; font-weight: bold;"></p>
    </div>
</div>
